<!DOCTYPE html>
<html lang="zh-CN" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.468.0"></script>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        html, body {
            overscroll-behavior: none;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        html.dark ::-webkit-scrollbar-track { background: #1f2937; }
        html.dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        html.dark ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        /* 加载动画 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f97316;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        html.dark .loader {
            border-color: #4b5563;
            border-top-color: #f97316;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 侧边栏链接激活态 */
        .sidebar-link.active {
            background-color: #1e40af;
            color: white;
            font-weight: 600;
        }
        html.dark .sidebar-link.active { background-color: #3b82f6; }

        /* 折叠菜单 */
        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out, opacity 0.3s ease-in-out;
            opacity: 0;
        }
        .submenu.open {
            max-height: 1000px;
            opacity: 1;
        }
        .category-header .accordion-icon {
            transition: transform 0.3s ease-in-out;
        }
        .category-header.open .accordion-icon {
            transform: rotate(180deg);
        }

        /* 内容区 */
        .content-section {
            padding-top: 3rem;
            padding-bottom: 3rem;
            border-bottom: 1px dashed #e2e8f0;
        }
        html.dark .content-section {
            border-bottom-color: #374151;
        }
        .content-section:last-child { border-bottom: none; }

        /* 移动端 */
        #sidebar {
            transition: transform 0.3s ease-in-out;
        }
        #sidebar-overlay {
            transition: opacity 0.3s ease-in-out;
        }
        #bottom-nav .nav-btn.active {
            color: #2563eb;
        }
        html.dark #bottom-nav .nav-btn.active {
            color: #3b82f6;
        }

        /* 淡入动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
    </style>
</head>
<body>

                <!-- JS 动态加载 -->
            </div>
        </main>
    </div>

    <!-- 移动端底部导航 -->

        <button data-nav="home" class="nav-btn flex flex-col items-center text-gray-600 dark:text-gray-400 transition-colors active">
            <i data-lucide="home" class="w-6 h-6"></i>

                                <div class="faq-answer px-4 pb-4 text-gray-600 dark:text-gray-300 hidden">饭卡：下载中国农业银行APP，搜索"生活缴费"点击"校园卡"。水卡：食堂一楼中间靠墙卡机，放卡按F键输入金额按OK（余额≤10元才能充）。</div>

                                <div class="faq-answer px-4 pb-4 text-gray-600 dark:text-gray-300 hidden">校内设有运营商营业厅。三家运营商套餐约39-49元/月（含校园卡+宽带）。也可申请5G校园专网（5g.jou.edu.cn）直接访问校内资源。</div>

                            <div class="faq-item bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden">

                            <div class="faq-item bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden">

                                <div class="faq-answer px-4 pb-4 text-gray-600 dark:text-gray-300 hidden">行政楼1楼最西侧（进门右手边第一个房间），24小时有值班人员。</div>

                                <button class="faq-question w-full p-4 text-left font-semibold text-gray-800 dark:text-gray-200 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                                    <span>快递在哪拿？</span>
                                    <i data-lucide="chevron-down" class="faq-icon w-5 h-5 text-gray-400 transition-transform"></i>
                                </button>
                                <div class="faq-answer px-4 pb-4 text-gray-600 dark:text-gray-300 hidden">食堂南侧菜鸟驿站。顺丰在华龙仓超市隔壁（一食堂对面），京东在卫生院北侧。</div>
                            </div>
                            <div class="faq-item bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden">
                                <button class="faq-question w-full p-4 text-left font-semibold text-gray-800 dark:text-gray-200 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                                    <span>电费怎么充值？</span>

                                </button>
                                <div class="faq-answer px-4 pb-4 text-gray-600 dark:text-gray-300 hidden">关注"江苏海洋大学微后勤"公众号→点击"用电充值"→选择校区、楼号、楼层、房间号→选择金额充值。</div>

                            <div class="faq-item bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden">
                                <button class="faq-question w-full p-4 text-left font-semibold text-gray-800 dark:text-gray-200 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                                    <span>衣服怎么洗？</span>
                                    <i data-lucide="chevron-down" class="faq-icon w-5 h-5 text-gray-400 transition-transform"></i>
                                </button>
                                <div class="faq-answer px-4 pb-4 text-gray-600 dark:text-gray-300 hidden">每层楼都有洗衣机，使用"U净"APP，打开蓝牙扫码选择时长即可。</div>
                            </div>
                            <div class="faq-item bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden">
                                <button class="faq-question w-full p-4 text-left font-semibold text-gray-800 dark:text-gray-200 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                                    <span>报到需要带什么？</span>
                                    <i data-lucide="chevron-down" class="faq-icon w-5 h-5 text-gray-400 transition-transform"></i>
                                </button>
                                <div class="faq-answer px-4 pb-4 text-gray-600 dark:text-gray-300 hidden">专科毕业证书（原件）、录取通知书、身份证原件及复印件、近期免冠一寸照片若干张、个人档案。</div>

                    `
                }
            }
        };

        function renderHome() {
            return `
                <!-- Hero -->
                <div class="rounded-2xl bg-gradient-to-br from-blue-600 via-blue-700 to-orange-500 text-white p-8 md:p-12 mb-8 text-center">
                    <h1 class="text-3xl md:text-5xl font-bold mb-4">你好，宋跳新同学</h1>
                    <p class="text-lg md:text-xl text-blue-100">江苏海洋大学宋跳校区 · 新生指南</p>
                    <p class="mt-2 text-sm text-blue-200">应用技术学院 — 专升本 · 职教高考</p>
                </div>
                <!-- 快速入口 -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <button onclick="navigateTo('enroll-process')" class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-md hover:shadow-lg transition-shadow text-center">
                        <i data-lucide="graduation-cap" class="w-8 h-8 mx-auto mb-2 text-orange-500"></i>
                        <p class="font-semibold text-gray-800 dark:text-gray-200">入学指南</p>
                        <p class="text-xs text-gray-500 mt-1">报到 · 专业 · 费用</p>
                    </button>
                    <button onclick="navigateTo('study-credit')" class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-md hover:shadow-lg transition-shadow text-center">
                        <i data-lucide="book-open" class="w-8 h-8 mx-auto mb-2 text-blue-500"></i>
                        <p class="font-semibold text-gray-800 dark:text-gray-200">学习指南</p>
                        <p class="text-xs text-gray-500 mt-1">学分制 · 书院 · 导师</p>
                    </button>
                    <button onclick="navigateTo('life-campus-card')" class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-md hover:shadow-lg transition-shadow text-center">
                        <i data-lucide="backpack" class="w-8 h-8 mx-auto mb-2 text-green-500"></i>
                        <p class="font-semibold text-gray-800 dark:text-gray-200">生活指南</p>
                        <p class="text-xs text-gray-500 mt-1">校园卡 · 网络 · 交通</p>
                    </button>
                    <button onclick="navigateTo('faq')" class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-md hover:shadow-lg transition-shadow text-center">
                        <i data-lucide="circle-help" class="w-8 h-8 mx-auto mb-2 text-purple-500"></i>
                        <p class="font-semibold text-gray-800 dark:text-gray-200">常见问题</p>
                        <p class="text-xs text-gray-500 mt-1">FAQ</p>
                    </button>
                </div>
                <!-- 校区简介 -->
                <div class="bg-white dark:bg-gray-800 rounded-xl p-6 md:p-8 shadow-md">
                    <h2 class="text-xl font-bold text-gray-800 dark:text-gray-100 mb-4">关于宋跳校区</h2>
                    <div class="prose dark:prose-invert max-w-none text-gray-600 dark:text-gray-300 space-y-3">
                        <p>宋跳校区位于江苏省连云港市海州区高新八路2号，地处宋跳高新技术开发区，占地约300亩，建筑面积8万余平方米，是江苏省"园林式单位"。</p>
                        <p>校区内设有应用技术学院，是江苏海洋大学下属的公办二级学院，专门承担<strong>专转本（专升本）</strong>和<strong>对口单招（职教高考）</strong>学生的培养任务。学院前身为1998年成立的淮海工学院东港学院，2019年随学校更名为江苏海洋大学应用技术学院，现有在校生约2900余人。</p>
                        <p>学院在国内高校中率先推行以<strong>选课制、导师制和书院制</strong>为核心的完全学分制人才培养模式（"东港模式"），设有海州、瀛洲、郁洲、凌州、环洲五大书院，实行弹性学制（3-6年），学生可跨专业选修课程。</p>
                        <p>学院拥有近30个实验室，与15家企业共建实习基地，推行"一书多证"制度，培养"基础实、能力强、上手快、后劲足"的应用技术人才。</p>
                    </div>
                </div>
            `;
        }

        function renderNav() {
            const nav = document.getElementById('nav-menu');
            let html = '';
            guideData.nav.forEach(item => {
                if (item.children) {
                    html += `
                        <div class="mb-1">
                            <div class="category-header flex items-center justify-between px-3 py-2.5 rounded-md cursor-pointer hover:bg-blue-800 dark:hover:bg-gray-800 transition-colors text-blue-200 dark:text-gray-300" data-category="${item.id}">
                                <span class="flex items-center">
                                    <i data-lucide="${item.icon}" class="w-4 h-4 mr-3"></i>
                                    <span>${item.label}</span>
                                </span>
                                <i data-lucide="chevron-down" class="accordion-icon w-4 h-4"></i>
                            </div>
                            <div class="submenu" data-submenu="${item.id}">
                                ${item.children.map(child => `
                                    <a href="#" class="sidebar-link flex items-center px-8 py-2 text-sm text-blue-200 dark:text-gray-400 rounded-md hover:bg-blue-800 dark:hover:bg-gray-800 transition-colors" data-page="${child.id}">
                                        <i data-lucide="circle" class="w-1.5 h-1.5 mr-2"></i>
                                        ${child.label}
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <a href="#" class="sidebar-link flex items-center px-3 py-2.5 rounded-md hover:bg-blue-800 dark:hover:bg-gray-800 transition-colors text-blue-200 dark:text-gray-300 ${item.id === 'home' ? 'active' : ''}" data-page="${item.id}">
                            <i data-lucide="${item.icon}" class="w-4 h-4 mr-3"></i>
                            <span>${item.label}</span>
                        </a>
                    `;
                }
            });
            nav.innerHTML = html;
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function navigateTo(pageId) {
            const data = guideData.pages[pageId];
            if (!data) return;

            // 更新标题
            document.getElementById('content-title').textContent = data.title;

            // 更新内容
            const area = document.getElementById('content-area');

            if (typeof data.render === 'function') {
                area.innerHTML = data.render();
            } else {
                area.innerHTML = data.content || '<p class="text-gray-500">内容加载中...</p>';
            }

            // 重新初始化 Lucide 图标
            if (typeof lucide !== 'undefined') lucide.createIcons();

            // 更新侧边栏激活态
            document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
            document.querySelectorAll(`.sidebar-link[data-page="${pageId}"]`).forEach(el => el.classList.add('active'));

            // 更新底部导航
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            for (const item of guideData.nav) {
                if (item.id === pageId) {
                    document.querySelector(`.nav-btn[data-nav="${item.id}"]`)?.classList.add('active');
                    break;
                }
                if (item.children) {
                    if (item.children.some(c => c.id === pageId)) {
                        document.querySelector(`.nav-btn[data-nav="${item.id}"]`)?.classList.add('active');
                        break;
                    }
                }
            }

            // 移动端关闭侧边栏
            closeSidebar();

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setupNavigation() {
            // 侧边栏链接
            document.addEventListener('click', function(e) {
                const link = e.target.closest('.sidebar-link');
                if (link && link.dataset.page) {
                    e.preventDefault();
                    navigateTo(link.dataset.page);
                }
            });

            // 分类折叠
            document.addEventListener('click', function(e) {
                const cat = e.target.closest('.category-header');
                if (cat) {
                    const sub = document.querySelector(`[data-submenu="${cat.dataset.category}"]`);
                    if (sub) {
                        sub.classList.toggle('open');
                        cat.classList.toggle('open');
                    }
                }
            });

            // 移动端菜单按钮
            document.getElementById('menu-toggle')?.addEventListener('click', function() {
                document.getElementById('sidebar').classList.toggle('-translate-x-full');
                document.getElementById('sidebar-overlay').classList.toggle('hidden');
            });

            // 遮罩层关闭
            document.getElementById('sidebar-overlay')?.addEventListener('click', closeSidebar);

            // 底部导航
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const nav = this.dataset.nav;
                    const item = guideData.nav.find(n => n.id === nav);
                    if (item) {
                        if (item.children && item.children.length > 0) {
                            navigateTo(item.children[0].id);
                        } else {
                            navigateTo(item.id);
                        }
                    }
                });
            });

            // 首页链接
            document.getElementById('home-link')?.addEventListener('click', function(e) {
                e.preventDefault();
                navigateTo('home');
            });
        }

        function closeSidebar() {
            if (window.innerWidth < 768) {
                document.getElementById('sidebar')?.classList.add('-translate-x-full');
                document.getElementById('sidebar-overlay')?.classList.add('hidden');
            }
        }

        // === 深色模式 ===
        function initTheme() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = saved ? saved === 'dark' : prefersDark;

            if (isDark) {
                document.documentElement.classList.add('dark');
            }
            updateThemeUI(isDark);
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeUI(isDark);
        }

        function updateThemeUI(isDark) {
            const sunIcon = document.getElementById('theme-icon-sun');
            const moonIcon = document.getElementById('theme-icon-moon');
            const text = document.getElementById('theme-text');
            if (sunIcon && moonIcon && text) {
                sunIcon.classList.toggle('hidden', isDark);
                moonIcon.classList.toggle('hidden', !isDark);
                text.textContent = isDark ? '切换亮色模式' : '切换深色模式';
            }
        }

        document.getElementById('theme-toggle-btn')?.addEventListener('click', toggleTheme);

        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            renderNav();
            setupNavigation();
            navigateTo('home');
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
            // FAQ accordion toggle
            document.addEventListener('click', function(e) {
                const q = e.target.closest('.faq-question');
                if (q) {
                    const answer = q.nextElementSibling;
                    const icon = q.querySelector('.faq-icon');
                    answer.classList.toggle('hidden');
                    icon.style.transform = answer.classList.contains('hidden') ? '' : 'rotate(180deg)';
                }
            });
        });

        // 页面加载完成后淡出加载动画
        window.addEventListener('load', function() {
            setTimeout(function() {
                const overlay = document.getElementById('loading-overlay');
                if (overlay) {
                    overlay.style.opacity = '0';
                    setTimeout(() => { overlay.style.display = 'none'; }, 500);
                }
            }, 600);
        });
    </script>
</body>
</html>
