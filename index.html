<!DOCTYPE html>
<html lang="zh-CN" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宋跳校区新生指南 · 江苏海洋大学</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        html, body {
            overscroll-behavior: none;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        html.dark ::-webkit-scrollbar-track { background: #1f2937; }
        html.dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        html.dark ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        /* 加载动画 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f97316;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        html.dark .loader {
            border-color: #4b5563;
            border-top-color: #f97316;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 侧边栏链接激活态 */
        .sidebar-link.active {
            background-color: #1e40af;
            color: white;
            font-weight: 600;
        }
        html.dark .sidebar-link.active { background-color: #3b82f6; }

        /* 折叠菜单 */
        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out, opacity 0.3s ease-in-out;
            opacity: 0;
        }
        .submenu.open {
            max-height: 1000px;
            opacity: 1;
        }
        .category-header .accordion-icon {
            transition: transform 0.3s ease-in-out;
        }
        .category-header.open .accordion-icon {
            transform: rotate(180deg);
        }

        /* 内容区 */
        .content-section {
            padding-top: 3rem;
            padding-bottom: 3rem;
            border-bottom: 1px dashed #e2e8f0;
        }
        html.dark .content-section {
            border-bottom-color: #374151;
        }
        .content-section:last-child { border-bottom: none; }

        /* 移动端 */
        #sidebar {
            transition: transform 0.3s ease-in-out;
        }
        #sidebar-overlay {
            transition: opacity 0.3s ease-in-out;
        }
        #bottom-nav .nav-btn.active {
            color: #2563eb;
        }
        html.dark #bottom-nav .nav-btn.active {
            color: #3b82f6;
        }

        /* 淡入动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
    </style>
</head>
<body>
    <!-- 后续所有 HTML 写在这里 -->
    <script>
        /* 后续所有 JS 写在这里 */
    </script>
</body>
</html>
