<!DOCTYPE html>
<html lang="zh-CN" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宋跳校区新生指南 · 江苏海洋大学</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        html, body {
            overscroll-behavior: none;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        html.dark ::-webkit-scrollbar-track { background: #1f2937; }
        html.dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        html.dark ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        /* 加载动画 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f97316;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        html.dark .loader {
            border-color: #4b5563;
            border-top-color: #f97316;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 侧边栏链接激活态 */
        .sidebar-link.active {
            background-color: #1e40af;
            color: white;
            font-weight: 600;
        }
        html.dark .sidebar-link.active { background-color: #3b82f6; }

        /* 折叠菜单 */
        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out, opacity 0.3s ease-in-out;
            opacity: 0;
        }
        .submenu.open {
            max-height: 1000px;
            opacity: 1;
        }
        .category-header .accordion-icon {
            transition: transform 0.3s ease-in-out;
        }
        .category-header.open .accordion-icon {
            transform: rotate(180deg);
        }

        /* 内容区 */
        .content-section {
            padding-top: 3rem;
            padding-bottom: 3rem;
            border-bottom: 1px dashed #e2e8f0;
        }
        html.dark .content-section {
            border-bottom-color: #374151;
        }
        .content-section:last-child { border-bottom: none; }

        /* 移动端 */
        #sidebar {
            transition: transform 0.3s ease-in-out;
        }
        #sidebar-overlay {
            transition: opacity 0.3s ease-in-out;
        }
        #bottom-nav .nav-btn.active {
            color: #2563eb;
        }
        html.dark #bottom-nav .nav-btn.active {
            color: #3b82f6;
        }

        /* 淡入动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div id="loading-overlay"
        class="fixed inset-0 bg-white dark:bg-gray-950 z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="loader"></div>
        <p class="mt-4 text-lg font-semibold text-gray-700 dark:text-gray-300">宋跳校区新生指南</p>
        <p class="text-sm text-gray-500">正在加载...</p>
    </div>

    <!-- 主视图 -->
    <div id="main-view" class="flex h-screen relative">
        <!-- 移动端遮罩层 -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden"></div>

        <!-- 侧边栏 -->
        <aside id="sidebar"
            class="w-72 bg-blue-900 dark:bg-gray-900 text-white p-5 overflow-y-auto transition-transform transform -translate-x-full md:translate-x-0 fixed md:relative h-full z-50 shadow-lg flex flex-col">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold tracking-wider">宋跳校区</h1>
                <p class="text-sm text-blue-200 dark:text-gray-400 mt-1">新生指南</p>
            </div>
            <!-- JS 动态渲染导航 -->
            <nav id="nav-menu" class="flex-grow"></nav>
            <!-- 底部工具栏 -->
            <div class="mt-auto pt-4 border-t border-blue-800 dark:border-gray-700 space-y-2">
                <!-- 深色模式按钮（JS 初始化） -->
                <button id="theme-toggle-btn"
                    class="w-full flex items-center justify-center px-4 py-2 text-sm text-blue-200 dark:text-gray-300 rounded-md hover:bg-blue-800 dark:hover:bg-gray-700 transition-colors">
                    <span id="theme-icon-sun" class="mr-2"><i data-lucide="sun" class="w-4 h-4"></i></span>
                    <span id="theme-icon-moon" class="mr-2 hidden"><i data-lucide="moon" class="w-4 h-4"></i></span>
                    <span id="theme-text">切换深色模式</span>
                </button>
            </div>
        </aside>

        <!-- 主内容 -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white dark:bg-gray-900 dark:border-b dark:border-gray-800 shadow-md p-3 flex justify-between items-center z-10 flex-shrink-0">
                <button id="menu-toggle" class="md:hidden text-gray-700 dark:text-gray-300">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <h2 id="content-title" class="text-xl font-semibold text-gray-800 dark:text-gray-100 truncate">
                    宋跳校区新生指南
                </h2>
                <a href="#" id="home-link" class="text-gray-600 dark:text-gray-400 hover:text-blue-700 transition-colors">
                    <i data-lucide="home" class="w-5 h-5"></i>
                </a>
            </header>
            <div id="content-area"
                class="flex-1 px-4 md:px-8 py-6 overflow-y-auto bg-gray-50 dark:bg-gray-950">
                <!-- JS 动态加载 -->
            </div>
        </main>
    </div>

    <!-- 移动端底部导航 -->
    <footer id="bottom-nav"
        class="fixed bottom-0 left-0 right-0 h-16 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-700 flex justify-around items-center z-30 md:hidden">
        <button data-nav="home" class="nav-btn flex flex-col items-center text-gray-600 dark:text-gray-400 transition-colors active">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-xs mt-1">首页</span>
        </button>
        <button data-nav="enroll" class="nav-btn flex flex-col items-center text-gray-600 dark:text-gray-400 transition-colors">
            <i data-lucide="graduation-cap" class="w-6 h-6"></i>
            <span class="text-xs mt-1">入学</span>
        </button>
        <button data-nav="study" class="nav-btn flex flex-col items-center text-gray-600 dark:text-gray-400 transition-colors">
            <i data-lucide="book-open" class="w-6 h-6"></i>
            <span class="text-xs mt-1">学习</span>
        </button>
        <button data-nav="life" class="nav-btn flex flex-col items-center text-gray-600 dark:text-gray-400 transition-colors">
            <i data-lucide="backpack" class="w-6 h-6"></i>
            <span class="text-xs mt-1">生活</span>
        </button>
        <button data-nav="faq" class="nav-btn flex flex-col items-center text-gray-600 dark:text-gray-400 transition-colors">
            <i data-lucide="circle-help" class="w-6 h-6"></i>
            <span class="text-xs mt-1">问答</span>
        </button>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
